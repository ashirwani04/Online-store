<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop — 20 Items</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  >
</head>
<body class="bg-body-tertiary">
  <main class="container py-5">
    <header class="text-center mb-5">
      <h1 class="display-5 fw-semibold">Our Collection</h1>
      <p class="lead text-secondary mb-0">Browse 20 items and add your favorites to the cart.</p>
    </header>

    <div class="row g-4">
      {% for item in items %}
      <article class="col-12 col-md-6 col-xl-4" id="item-{{ item.id }}">
        {% if added_item and added_item.id == item.id %}
        <div class="alert alert-success mb-3" role="alert">
          <strong>{{ item.name }}</strong> has been added to cart.
        </div>
        {% endif %}

        <div class="card shadow-sm border-0 h-100">
          <img
            src="{{ item.image_url }}"
            class="card-img-top"
            alt="{{ item.image_alt }}"
            width="800"
            height="533"
          >
          <div class="card-body p-4 d-flex flex-column">
            <h2 class="h4 fw-semibold mb-2">{{ item.name }}</h2>
            <p class="lead text-secondary mb-3">{{ item.lead }}</p>
            <p class="mb-4 flex-grow-1">{{ item.description }}</p>
            <form method="post" action="{{ url_for('index') }}#item-{{ item.id }}">
              <input type="hidden" name="item_id" value="{{ item.id }}">
              <div class="d-flex align-items-center justify-content-between flex-wrap gap-3">
                <span class="fs-5 fw-bold text-primary">{{ item.price }}</span>
                <button type="submit" class="btn btn-primary px-4">
                  Add to Cart
                </button>
              </div>
            </form>
          </div>
        </div>
      </article>
      {% endfor %}
    </div>
  </main>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"
  ></script>
</body>
</html>
