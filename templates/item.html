<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ item.name }}</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  >
</head>
<body class="bg-body-tertiary">
  <main class="container py-5">
    <p class="mb-4">
      <a href="{{ url_for('index') }}" class="text-decoration-none">&larr; Back to collection</a>
    </p>

    <div class="row justify-content-center">
      <article class="col-12 col-lg-8">
        {% if added_to_cart %}
        <div class="alert alert-success mb-4" role="alert">
          <strong>{{ item.name }}</strong> has been added to cart.
        </div>
        {% endif %}

        <div class="card shadow-sm border-0">
          <img
            src="{{ item.image_url }}"
            class="card-img-top"
            alt="{{ item.image_alt }}"
            width="800"
            height="533"
          >
          <div class="card-body p-4 p-md-5">
            <h1 class="display-6 fw-semibold mb-3">{{ item.name }}</h1>
            <p class="lead text-secondary mb-4">{{ item.lead }}</p>
            <p class="mb-4">{{ item.description }}</p>
            <form method="post" action="{{ url_for('item_detail', id=item.id) }}">
              <div class="d-flex align-items-center justify-content-between flex-wrap gap-3">
                <span class="fs-4 fw-bold text-primary">{{ item.price }}</span>
                <button type="submit" class="btn btn-primary btn-lg px-4">
                  Add to Cart
                </button>
              </div>
            </form>
          </div>
        </div>
      </article>
    </div>
  </main>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"
  ></script>
</body>
</html>
